services:
  # ─── PostgreSQL with pgvector ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: kh-hindsight-pg
    restart: unless-stopped
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_USER: hindsight
      POSTGRES_PASSWORD: ${HINDSIGHT_DB_PASSWORD:?Set HINDSIGHT_DB_PASSWORD}
      POSTGRES_DB: hindsight
    volumes:
      - kh_hindsight_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hindsight -d hindsight"]
      interval: 5s
      timeout: 3s
      retries: 10
    shm_size: 256mb

  # ─── Hindsight API ────────────────────────────────────────────────
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: kh-hindsight
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:9999:9999"
      - "100.107.71.21:8888:8888"
      - "100.107.71.21:9999:9999"
    environment:
      HINDSIGHT_API_DATABASE_URL: "postgresql://hindsight:${HINDSIGHT_DB_PASSWORD}@postgres:5432/hindsight"
      HINDSIGHT_API_LLM_PROVIDER: openai
      HINDSIGHT_API_LLM_MODEL: gpt-4o-mini
      HINDSIGHT_API_LLM_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY}
      HINDSIGHT_API_LLM_BASE_URL: https://api.openai.com/v1
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: local
      HINDSIGHT_API_EMBEDDINGS_LOCAL_MODEL: BAAI/bge-small-en-v1.5
      HINDSIGHT_API_VECTOR_EXTENSION: pgvector
      HINDSIGHT_API_RUN_MIGRATIONS_ON_STARTUP: "true"
      HINDSIGHT_API_PORT: "8888"
      HINDSIGHT_API_HOST: "0.0.0.0"
      HINDSIGHT_API_LOG_LEVEL: info
      HINDSIGHT_ENABLE_API: "true"
      HINDSIGHT_ENABLE_CP: "true"
      HINDSIGHT_CP_DATAPLANE_API_URL: "http://100.107.71.21:8888"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ─── CDC Replicator ──────────────────────────────────────────────
  hindsight-cdc:
    build:
      context: ./hindsight-cdc
    container_name: kh-hindsight-cdc
    restart: unless-stopped
    network_mode: "container:kh-hindsight"
    depends_on:
      hindsight:
        condition: service_healthy
    environment:
      NEON_DSN: ${NEON_DSN:?Set NEON_DSN}
      LOCAL_DSN: "postgresql://hindsight:${HINDSIGHT_DB_PASSWORD}@postgres:5432/hindsight"
      PG_BIN: /usr/bin

volumes:
  kh_hindsight_pgdata:
